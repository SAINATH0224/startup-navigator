<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore all startup topics on Startup Navigator – company registration, funding, legal compliance, hiring, marketing and more.">
  <title>Explore Topics – Startup Navigator</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="container">
  <div class="page-header">
    <span class="section-label">Knowledge Base</span>
    <h1 class="page-header-title">Explore <span class="text-gradient">Startup Topics</span></h1>
    <p class="page-header-desc">10 comprehensive guides covering every aspect of building a successful startup in India.</p>
  </div>

  <!-- Controls -->
  <div class="explore-controls">
    <div class="search-bar" style="flex:1; min-width:280px">
      <span style="color:var(--text-muted)">🔍</span>
      <input type="search" id="topic-search" placeholder="Search topics..." aria-label="Search topics">
    </div>
    <div class="filter-pills" id="category-filters">
      <button class="filter-pill active" data-filter="all" id="filter-all">All Topics</button>
      <button class="filter-pill" data-filter="legal" id="filter-legal">⚖️ Legal</button>
      <button class="filter-pill" data-filter="finance" id="filter-finance">💰 Finance</button>
      <button class="filter-pill" data-filter="growth" id="filter-growth">📈 Growth</button>
      <button class="filter-pill" data-filter="ops" id="filter-ops">⚙️ Operations</button>
    </div>
  </div>

  <!-- Results count -->
  <p style="color:var(--text-muted); font-size:0.875rem; margin-bottom:24px" id="results-count"></p>

  <!-- Topics Grid -->
  <div class="topics-grid" id="topics-grid">
    <div class="loading-state"><div class="spinner"></div><p>Loading topics...</p></div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  const FILTER_MAP = {
    legal: ['legal-compliance', 'company-registration', 'taxation'],
    finance: ['funding', 'fundraising', 'taxation'],
    growth: ['marketing', 'business-growth', 'branding'],
    ops: ['hiring', 'ai-tools']
  };

  let currentFilter = 'all';
  let searchQuery = '';

  function renderTopics() {
    const grid = document.getElementById('topics-grid');
    const count = document.getElementById('results-count');
    const all = getTopics();

    let filtered = all;

    // Apply category filter
    if (currentFilter !== 'all' && FILTER_MAP[currentFilter]) {
      filtered = filtered.filter(t => FILTER_MAP[currentFilter].includes(t.id));
    }

    // Apply search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(t =>
        t.title.toLowerCase().includes(q) ||
        t.description.toLowerCase().includes(q) ||
        (t.keywords || []).some(k => k.includes(q))
      );
    }

    count.textContent = `Showing ${filtered.length} of ${all.length} topics`;

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">🔍</div>
          <h3>No topics found</h3>
          <p>Try a different search term or clear your filters.</p>
          <button class="btn btn-secondary" style="margin-top:16px" onclick="clearSearch()">Clear Search</button>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(t => `
      <a href="topic-detail.html?id=${t.id}" class="topic-card" style="--card-accent: ${t.color}" id="explore-card-${t.id}">
        <span class="topic-card-icon">${t.icon}</span>
        <div class="topic-card-title">${t.title}</div>
        <div class="topic-card-desc">${t.shortDesc}</div>
        <div class="topic-card-footer">
          <span class="topic-card-meta">${(t.steps || []).length} steps · In-depth guide</span>
          <span class="topic-card-arrow">→</span>
        </div>
      </a>
    `).join('');
  }

  function clearSearch() {
    document.getElementById('topic-search').value = '';
    searchQuery = '';
    renderTopics();
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderTopics();

    // Search
    const searchInput = document.getElementById('topic-search');
    searchInput.addEventListener('input', debounce((e) => {
      searchQuery = e.target.value.trim();
      renderTopics();
    }, 250));

    // Filter pills
    document.querySelectorAll('.filter-pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentFilter = pill.dataset.filter;
        renderTopics();
      });
    });

    // Check for pre-selected topic from URL
    const selectedId = getParam('id');
    if (selectedId) {
      setTimeout(() => {
        const card = document.getElementById(`explore-card-${selectedId}`);
        if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 300);
    }
  });
</script>
</body>
</html>
